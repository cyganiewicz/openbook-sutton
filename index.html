const REVENUE={fy27:[{source:"Property Tax Levy",amount:15848000,percent:70.9},{source:"State Aid",amount:4235000,percent:18.9},{source:"Local Receipts",amount:1572000,percent:7.0},{source:"Free Cash / Available Funds",amount:700000,percent:3.1}]};
const BUDGET_HISTORY=[{year:"FY2023",amount:19850000},{year:"FY2024",amount:20412000},{year:"FY2025",amount:20856000},{year:"FY2026",amount:21041000},{year:"FY2027",amount:22355000,proposed:true}];

function fmt(n){if(n>=1000000)return`$${(n/1000000).toFixed(2)}M`;if(n>=1000)return`$${(n/1000).toFixed(0)}K`;return`$${n.toLocaleString()}`;}
function fmtFull(n){return`$${n.toLocaleString()}`;}
function pctChg(a,b){return((b-a)/a)*100;}
function getByCategoryTotals(){const t={};DEPARTMENTS.forEach(d=>{const c=d.category,a=d.fy27_request||d.fy26_approved;t[c]=(t[c]||0)+a;});return t;}
function getSubmissionStats(){const c={not_started:0,submitted:0,under_review:0,approved:0,draft:0};DEPARTMENTS.forEach(d=>{c[d.request_status]=(c[d.request_status]||0)+1;});return c;}

async function loadAllData(){
  if(!_supa)return;
  try{
    const[dR,lR,cR,eR]=await Promise.all([
      _supa.from('departments').select('*'),
      _supa.from('line_items').select('*').order('dept_id').order('sort_order'),
      _supa.from('capital_projects').select('*'),
      _supa.from('enterprise_funds').select('*'),
    ]);
    if(dR.error||lR.error||cR.error||eR.error){console.error('Supabase load error',dR.error||lR.error||cR.error||eR.error);return;}
    const byDept={};
    (lR.data||[]).forEach(li=>{if(!byDept[li.dept_id])byDept[li.dept_id]=[];byDept[li.dept_id].push({code:li.code,name:li.name,fy25_actual:li.fy25_actual||0,fy26_approved:li.fy26_approved||0,fy27_request:li.fy27_request||0,fy27_recommended:li.fy27_recommended,_db_id:li.id});});
    DEPARTMENTS=(dR.data||[]).map(d=>({id:d.id,name:d.name,shortName:d.short_name,category:d.category,head:d.head||'',phone:d.phone||'',email:d.email||'',mission:d.mission||'',highlights:d.highlights||[],fy25_actual:d.fy25_actual||0,fy26_approved:d.fy26_approved||0,fy27_request:d.fy27_request||0,fy27_recommended:d.fy27_recommended,fy27_approved:d.fy27_approved,request_status:d.request_status||'not_started',request_note:d.request_note||'',tm_note:d.tm_note,lineItems:byDept[d.id]||[]}));
    CAPITAL_PROJECTS=(cR.data||[]).map(p=>({id:p.id,name:p.name,department:p.department,description:p.description||'',category:p.category||'',priority:p.priority||'medium',funding_source:p.funding_source||'',status:p.status||'under_review',total:p.total||0,years:p.years||[],tm_note:p.tm_note}));
    ENTERPRISE_FUNDS=(eR.data||[]).map(f=>({id:f.id,name:f.name,shortName:f.short_name,head:f.head,mission:f.mission||'',stats:f.stats||[],fy25_actual:f.fy25_actual||0,fy26_approved:f.fy26_approved||0,fy27_request:f.fy27_request||0,lineItems:f.line_items||[]}));
  }catch(e){console.error('loadAllData failed',e);}
}
</script>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

// ── Chart helpers ─────────────────────────────────────────────────────────────
const CHART_COLORS=["#2d6a4f","#40916c","#c9a227","#52b788","#1b4332","#74c69d","#7b6fa0","#457b9d"];

function useChart(canvasRef,getConfig,deps){
  const inst=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current)return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    const cfg=getConfig();
    if(cfg)inst.current=new Chart(canvasRef.current,cfg);
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },deps);
}

function DonutChart({labels,values,colors,centerLabel,centerSub,height=240}){
  const ref=useRef(null);
  useChart(ref,()=>({type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors||CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: $${(c.raw/1000000).toFixed(2)}M`}}}}}), [JSON.stringify(values)]);
  return(
    <div style={{position:'relative',height}}>
      <canvas ref={ref}/>
      {centerLabel&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',pointerEvents:'none'}}>
        <div style={{fontSize:20,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif",lineHeight:1.1}}>{centerLabel}</div>
        {centerSub&&<div style={{fontSize:10,color:'#5a7a66',marginTop:2,fontWeight:500,letterSpacing:'0.02em'}}>{centerSub}</div>}
      </div>}
    </div>
  );
}

function BarChart({labels,datasets,height=240,horizontal=false,showLegend=true}){
  const ref=useRef(null);
  useChart(ref,()=>({type:'bar',data:{labels,datasets},options:{indexAxis:horizontal?'y':'x',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:showLegend&&datasets.length>1,position:'top',labels:{font:{family:'Figtree',size:11},padding:12,boxWidth:10}},tooltip:{callbacks:{label:c=>` ${c.dataset.label||''}: $${c.raw.toLocaleString()}`}}},scales:{x:{stacked:false,grid:{display:!horizontal,color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'Figtree',size:10},maxRotation:horizontal?0:35}},y:{grid:{display:horizontal,color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'Figtree',size:10},callback:v=>horizontal?v:(v>=1000000?`$${(v/1000000).toFixed(1)}M`:v>=1000?`$${(v/1000).toFixed(0)}K`:`$${v}`)}}}}}),[JSON.stringify({labels,datasets})]);
  return <div style={{height}}><canvas ref={ref}/></div>;
}

function LineChart({labels,datasets,height=200}){
  const ref=useRef(null);
  useChart(ref,()=>({type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` $${(c.raw/1000000).toFixed(2)}M`}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Figtree',size:10}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{family:'Figtree',size:10},callback:v=>`$${(v/1000000).toFixed(1)}M`}}}}}),[JSON.stringify(datasets)]);
  return <div style={{height}}><canvas ref={ref}/></div>;
}

function Legend({labels,colors,values,total}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:7}}>
      {labels.map((l,i)=>(
        <div key={l} style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:10,height:10,borderRadius:3,background:colors?colors[i]:CHART_COLORS[i],flexShrink:0}}/>
          <div style={{flex:1,fontSize:11,color:'#3a4a42',fontWeight:500,lineHeight:1.3}}>{l}</div>
          {values&&<div style={{fontSize:11,color:'#1b2e22',fontWeight:700,fontVariantNumeric:'tabular-nums'}}>{total?`${((values[i]/total)*100).toFixed(1)}%`:fmt(values[i])}</div>}
        </div>
      ))}
    </div>
  );
}

function StatCard({label,value,sub,delta,accent=false}){
  return(
    <div style={{background:accent?'#1b3a2a':'#fff',borderRadius:10,padding:'18px 22px',border:accent?'none':'1px solid #dde8e2',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:accent?'rgba(255,255,255,0.55)':'#6a8c78',marginBottom:5}}>{label}</div>
      <div style={{fontSize:26,fontWeight:700,color:accent?'#fff':'#1b2e22',fontFamily:"'Source Serif 4',serif",lineHeight:1.1}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:accent?'rgba(255,255,255,0.5)':'#6a8c78',marginTop:3}}>{sub}</div>}
      {delta!==undefined&&<div style={{marginTop:7,display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:600,color:delta>0?'#b91c1c':'#15803d',background:delta>0?'#fef2f2':'#f0fdf4',borderRadius:20,padding:'2px 8px'}}>{delta>0?'▲':'▼'} {Math.abs(delta).toFixed(1)}% vs prior year</div>}
    </div>
  );
}

// ── Shared UI ──────────────────────────────────────────────────────────────────
const thStyle={padding:'11px 14px',fontWeight:700,fontSize:10,textTransform:'uppercase',letterSpacing:'0.05em',color:'#5a7a66',textAlign:'left'};
const tdStyle={padding:'12px 14px'};

const CAP_STATUS={recommended:{label:'Recommended',bg:'#e8f5e9',color:'#2e7d32'},funded:{label:'Funded',bg:'#e3f2fd',color:'#1565c0'},planned:{label:'Planned',bg:'#fff8e1',color:'#e65100'},under_review:{label:'Under Review',bg:'#fce4ec',color:'#880e4f'},deferred:{label:'Deferred',bg:'#f3e5f5',color:'#6a1b9a'}};
const REQ_STATUS={not_started:{label:'Not Started',bg:'#f5f5f5',color:'#777',dot:'#aaa'},draft:{label:'Draft',bg:'#e8f4fd',color:'#1565c0',dot:'#64b5f6'},submitted:{label:'Submitted',bg:'#e8f5e9',color:'#2e7d32',dot:'#66bb6a'},under_review:{label:'Under Review',bg:'#fff8e1',color:'#e65100',dot:'#ffa726'},approved:{label:'Approved',bg:'#e0f7fa',color:'#00695c',dot:'#26c6da'}};

function CapBadge({status}){const s=CAP_STATUS[status]||{label:status,bg:'#f5f5f5',color:'#555'};return <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.04em',padding:'2px 8px',borderRadius:20,background:s.bg,color:s.color,textTransform:'uppercase'}}>{s.label}</span>;}
function StatusPill({status}){const s=REQ_STATUS[status]||REQ_STATUS.not_started;return <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:10,fontWeight:700,letterSpacing:'0.04em',padding:'3px 9px 3px 6px',borderRadius:20,background:s.bg,color:s.color,textTransform:'uppercase'}}><span style={{width:6,height:6,borderRadius:'50%',background:s.dot,flexShrink:0}}/>{s.label}</span>;}
function Card({children,style={}}){return <div style={{background:'#fff',borderRadius:10,border:'1px solid #dde8e2',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',...style}}>{children}</div>;}

// ── PUBLIC: Dashboard ─────────────────────────────────────────────────────────

  const topDepts=[...DEPARTMENTS].sort((a,b)=>b.fy27_request-a.fy27_request).slice(0,8);
  const total27=TOWN.totalBudget,total26=TOWN.priorBudget;
  return(
    <div style={{padding:'32px 36px',maxWidth:1200}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:12,fontWeight:600,color:'#5a7a66',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:5}}>Town of Sutton, Massachusetts</div>
        <h1 style={{margin:'0 0 8px',fontSize:32,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>FY2027 Operating Budget Overview</h1>
        <p style={{margin:0,color:'#5a7a66',fontSize:14,maxWidth:660,lineHeight:1.6}}>The Town of Sutton's Proposed FY2027 General Fund budget is presented for public review. The fiscal year runs July 1, 2026 through June 30, 2027.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}}>
        <StatCard label="Proposed Budget" value={fmt(total27)} sub="General Fund" delta={pctChg(total26,total27)} accent/>
        <StatCard label="Prior Year Budget" value={fmt(total26)} sub="FY2026 Approved"/>
        <StatCard label="Tax Rate" value={`$${TOWN.taxRate.toFixed(2)}`} sub="per $1,000 assessed value" delta={pctChg(TOWN.priorTaxRate,TOWN.taxRate)}/>
        <StatCard label="Enterprise Funds" value={fmt(ENTERPRISE_FUNDS.reduce((s,f)=>s+f.fy27_request,0))} sub="Water & Sewer"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.1fr 1fr',gap:18,marginBottom:18}}>
        <Card style={{padding:22}}>
          <h3 style={{margin:'0 0 3px',fontSize:14,fontWeight:700,color:'#1b2e22'}}>Budget by Category</h3>
          <p style={{margin:'0 0 14px',fontSize:11,color:'#7a9a86'}}>FY2027 Proposed General Fund — {fmt(total27)} total</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'center'}}>
            <DonutChart labels={catLabels} values={catValues} colors={catColors} centerLabel={fmt(total27)} centerSub="Total Budget" height={210}/>
            <Legend labels={catLabels} colors={catColors} values={catValues} total={total27}/>
          </div>
        </Card>
        <Card style={{padding:22}}>
          <h3 style={{margin:'0 0 3px',fontSize:14,fontWeight:700,color:'#1b2e22'}}>Revenue Sources</h3>
          <p style={{margin:'0 0 14px',fontSize:11,color:'#7a9a86'}}>How the FY2027 budget is funded</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'center'}}>
            <DonutChart labels={REVENUE.fy27.map(r=>r.source)} values={REVENUE.fy27.map(r=>r.amount)} colors={['#2d6a4f','#40916c','#c9a227','#74c69d']} centerLabel="4 Sources" centerSub="of Revenue" height={210}/>
            <Legend labels={REVENUE.fy27.map(r=>r.source)} colors={['#2d6a4f','#40916c','#c9a227','#74c69d']} values={REVENUE.fy27.map(r=>r.amount)} total={total27}/>
          </div>
        </Card>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:18,marginBottom:18}}>
        <Card style={{padding:22}}>
          <h3 style={{margin:'0 0 3px',fontSize:14,fontWeight:700,color:'#1b2e22'}}>Top Departments — FY2027 vs FY2026</h3>
          <p style={{margin:'0 0 14px',fontSize:11,color:'#7a9a86'}}>Proposed vs. prior year approved</p>

          <h3 style={{margin:'0 0 3px',fontSize:14,fontWeight:700,color:'#1b2e22'}}>5-Year Budget Trend</h3>

  );
}

function DepartmentList({onNav}){
  const [search,setSearch]=useState('');
  const [cat,setCat]=useState('all');

  return(
    <div style={{padding:'32px 36px',maxWidth:1100}}>
      <h1 style={{margin:'0 0 6px',fontSize:28,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>Department Budgets</h1>
      <p style={{margin:'0 0 22px',color:'#5a7a66',fontSize:14}}>FY2027 proposed operating budgets for all town departments</p>
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search departments..." style={{flex:1,minWidth:180,padding:'8px 13px',borderRadius:7,border:'1px solid #c8ddd4',fontSize:13,fontFamily:'Figtree,sans-serif'}}/>

        </select>
      </div>
      <Card style={{overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'#f2f7f4',borderBottom:'1px solid #dde8e2'}}>
            <th style={{...thStyle,paddingLeft:20}}>Department</th>
            <th style={{...thStyle,textAlign:'right'}}>FY2025 Actual</th>
            <th style={{...thStyle,textAlign:'right'}}>FY2026 Approved</th>
            <th style={{...thStyle,textAlign:'right'}}>FY2027 Proposed</th>
            <th style={{...thStyle,textAlign:'right'}}>Change</th>
            <th style={thStyle}></th>
          </tr></thead>
          <tbody>
            {filtered.map((dept,i)=>{
              const c=pctChg(dept.fy26_approved,dept.fy27_request);

                <tr key={dept.id} style={{borderBottom:i<filtered.length-1?'1px solid #eef3f0':'none'}} onMouseEnter={e=>e.currentTarget.style.background='#f8fbf9'} onMouseLeave={e=>e.currentTarget.style.background=''}>

// ── PUBLIC: Capital Plan ──────────────────────────────────────────────────────
function CapitalPlan(){
  const [yr,setYr]=useState('all');
  const [dept,setDept]=useState('all');
  const [stat,setStat]=useState('all');
  const [search,setSearch]=useState('');
  const years=['FY2027','FY2028','FY2029','FY2030','FY2031'];
  const deptIds=[...new Set(CAPITAL_PROJECTS.map(p=>p.department))];
  const getDeptName=id=>DEPARTMENTS.find(x=>x.id===id)?.shortName||id.toUpperCase();
  const filtered=useMemo(()=>CAPITAL_PROJECTS.filter(p=>(yr==='all'||p.years.some(y=>y.year===yr))&&(dept==='all'||p.department===dept)&&(stat==='all'||p.status===stat)&&(p.name.toLowerCase().includes(search.toLowerCase())||p.description.toLowerCase().includes(search.toLowerCase()))),[yr,dept,stat,search]);
  const byYear=years.map(y=>({year:y,total:CAPITAL_PROJECTS.reduce((s,p)=>s+(p.years.find(x=>x.year===y)?.amount||0),0)}));
  return(
    <div style={{padding:'32px 36px',maxWidth:1200}}>
      <h1 style={{margin:'0 0 6px',fontSize:28,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>Capital Improvement Plan</h1>
      <p style={{margin:'0 0 22px',color:'#5a7a66',fontSize:14}}>FY2027–FY2031 — Major infrastructure, equipment, and facility projects</p>
      <Card style={{padding:22,marginBottom:20}}>
        <h3 style={{margin:'0 0 3px',fontSize:14,fontWeight:700,color:'#1b2e22'}}>Capital Investment by Fiscal Year</h3>
        <p style={{margin:'0 0 14px',fontSize:11,color:'#7a9a86'}}>All projects — {fmt(CAPITAL_PROJECTS.reduce((s,p)=>s+p.total,0))} total over 5 years</p>
        <BarChart labels={byYear.map(b=>b.year)} datasets={[{label:'Capital Investment',data:byYear.map(b=>b.total),backgroundColor:['#2d6a4f','#40916c','#52b788','#74c69d','#b7e4c7'],borderRadius:5,borderWidth:0}]} showLegend={false} height={160}/>
      </Card>
      <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search projects..." style={{flex:1,minWidth:160,padding:'7px 12px',borderRadius:7,border:'1px solid #c8ddd4',fontSize:12,fontFamily:'Figtree,sans-serif'}}/>
        {[{v:yr,set:setYr,opts:[['all','All Years'],...years.map(y=>[y,y])]},{v:dept,set:setDept,opts:[['all','All Depts'],...deptIds.map(d=>[d,getDeptName(d)])]},{v:stat,set:setStat,opts:[['all','All Statuses'],...Object.entries(CAP_STATUS).map(([k,v])=>[k,v.label])]}].map((f,i)=>(
          <select key={i} value={f.v} onChange={e=>f.set(e.target.value)} style={{padding:'7px 12px',borderRadius:7,border:'1px solid #c8ddd4',fontSize:12,background:'#fff',fontFamily:'Figtree,sans-serif'}}>
            {f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        ))}
        <div style={{display:'flex',alignItems:'center',padding:'0 14px',background:'#1b3a2a',borderRadius:7,color:'#fff',fontSize:12,fontWeight:600}}>{filtered.length} projects · {fmt(filtered.reduce((s,p)=>s+p.total,0))}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {filtered.map(proj=>(
          <Card key={proj.id} style={{padding:'18px 22px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:14,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                  <h3 style={{margin:0,fontSize:14,fontWeight:700,color:'#1b2e22'}}>{proj.name}</h3>
                  <CapBadge status={proj.status}/>
                </div>
                <div style={{fontSize:11,color:'#7a9a86'}}>{getDeptName(proj.department)} · {proj.category} · {proj.funding_source}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:18,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>{fmtFull(proj.total)}</div><div style={{fontSize:10,color:'#7a9a86'}}>Total Cost</div></div>
            </div>
            <p style={{margin:'0 0 12px',fontSize:12,color:'#3a5444',lineHeight:1.65}}>{proj.description}</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {proj.years.map(y=><div key={y.year} style={{background:'#f2f7f4',borderRadius:5,padding:'4px 10px',fontSize:11,fontWeight:600}}><span style={{color:'#5a7a66'}}>{y.year}: </span><span style={{color:'#1b2e22'}}>{fmtFull(y.amount)}</span></div>)}
            </div>
          </Card>
        ))}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'48px',color:'#8aaa96',fontSize:13}}>No projects match your filters.</div>}
      </div>
    </div>
  );
}

// ── INTERNAL: Budget Request Form ─────────────────────────────────────────────

  const [items,setItems]=useState(dept.lineItems.map(li=>({...li})));
  const [narrative,setNarrative]=useState(dept.request_note||'');
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState('');
  const totalReq=items.reduce((s,li)=>s+(parseInt(li.fy27_request)||0),0);
  const chg=pctChg(dept.fy26_approved,totalReq);
  function updateItem(i,val){const u=[...items];u[i]={...u[i],fy27_request:parseInt(val)||0};setItems(u);setSaved(false);}
  async function handleSave(submit=false){
    setSaving(true);setError('');
    if(_supa){
      try{
        const[dErr,liErrs]=await Promise.all([
          _supa.from('departments').update({request_note:narrative,request_status:submit?'submitted':'draft'}).eq('id',deptId).then(r=>r.error),
          Promise.all(items.filter(li=>li._db_id).map(li=>_supa.from('line_items').update({fy27_request:li.fy27_request}).eq('id',li._db_id).then(r=>r.error)))
        ]);
        if(dErr||(liErrs||[]).some(Boolean)){throw new Error('Save failed — check console');}
        await loadAllData();
        if(refreshData)refreshData();
      }catch(e){setError(e.message||'Save failed');setSaving(false);return;}
    }
    setSaving(false);setSaved(true);
    if(submit)setTimeout(()=>onNav('dept/dashboard'),1000);
  }
  return(
    <div style={{padding:'32px 36px',maxWidth:900}}>
      <button onClick={()=>onNav('dept/dashboard')} style={{background:'none',border:'none',color:'#5a7a66',fontSize:12,cursor:'pointer',padding:0,marginBottom:18}}>← Back to Dashboard</button>
      <h1 style={{margin:'0 0 4px',fontSize:24,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>FY2027 Budget Request — {dept.shortName}</h1>
      <p style={{margin:'0 0 22px',color:'#5a7a66',fontSize:13}}>Complete all line items and provide justification before submitting.</p>
      {saved&&<div style={{background:'#e8f5e9',border:'1px solid #c8e6c9',borderRadius:8,padding:'10px 16px',marginBottom:16,color:'#2e7d32',fontWeight:600,fontSize:12}}>Budget request saved successfully.</div>}
      {error&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',marginBottom:16,color:'#880e4f',fontWeight:600,fontSize:12}}>{error}</div>}
      {DEMO_MODE&&<div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:8,padding:'9px 14px',marginBottom:14,fontSize:11,color:'#856404'}}><strong>Demo mode:</strong> Changes will not be saved to a database. Configure Supabase in index.html to enable persistence.</div>}
      <Card style={{marginBottom:18}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #eef3f0'}}><h3 style={{margin:0,fontSize:13,fontWeight:700,color:'#1b2e22'}}>Line Item Detail</h3><p style={{margin:'3px 0 0',fontSize:11,color:'#7a9a86'}}>Amounts exceeding 10% over prior year require additional justification.</p></div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr style={{background:'#f2f7f4'}}><th style={{...thStyle,paddingLeft:20}}>Line Item</th><th style={{...thStyle,textAlign:'right'}}>FY2025 Actual</th><th style={{...thStyle,textAlign:'right'}}>FY2026 Approved</th><th style={{...thStyle,textAlign:'right',color:'#1b3a2a'}}>FY2027 Request</th><th style={{...thStyle,textAlign:'right'}}>Chg</th></tr></thead>
          <tbody>
            {items.map((li,i)=>{const c=pctChg(li.fy26_approved,li.fy27_request),high=c>10;return(
              <tr key={li.code} style={{borderBottom:'1px solid #eef3f0',background:high?'#fffdf0':'transparent'}}>
                <td style={{...tdStyle,paddingLeft:20}}><span style={{fontSize:10,color:'#aac4b4',marginRight:7}}>{li.code}</span><span style={{fontWeight:500,color:'#2a4a38'}}>{li.name}</span>{high&&<span style={{marginLeft:7,fontSize:9,background:'#fff3cd',color:'#856404',padding:'1px 5px',borderRadius:3,fontWeight:700}}>HIGH</span>}</td>
                <td style={{...tdStyle,textAlign:'right',color:'#8aaa96',fontSize:11}}>{fmtFull(li.fy25_actual)}</td>
                <td style={{...tdStyle,textAlign:'right',color:'#6a8c78'}}>{fmtFull(li.fy26_approved)}</td>
                <td style={{...tdStyle,textAlign:'right'}}><input type="number" value={li.fy27_request} onChange={e=>updateItem(i,e.target.value)} style={{width:108,padding:'5px 8px',borderRadius:6,border:`1.5px solid ${high?'#ffc107':'#c8ddd4'}`,fontSize:12,textAlign:'right',fontFamily:'Figtree,sans-serif',fontWeight:600}}/></td>
                <td style={{...tdStyle,textAlign:'right',fontSize:11,fontWeight:600,color:c>10?'#b91c1c':c>0?'#c2410c':'#15803d'}}>{c>0?'+':''}{c.toFixed(1)}%</td>
              </tr>
            );})}
          </tbody>
          <tfoot><tr style={{background:'#1b3a2a',color:'#fff'}}><td style={{...tdStyle,paddingLeft:20,fontWeight:700}} colSpan={2}>Total Request</td><td style={{...tdStyle,textAlign:'right',fontWeight:700}}>{fmtFull(dept.fy26_approved)}</td><td style={{...tdStyle,textAlign:'right',fontWeight:700,fontSize:14}}>{fmtFull(totalReq)}</td><td style={{...tdStyle,textAlign:'right',fontWeight:700,color:chg>10?'#ffb3b3':'#c9a227'}}>{chg>0?'+':''}{chg.toFixed(1)}%</td></tr></tfoot>
        </table>
      </Card>
      <Card style={{marginBottom:20}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #eef3f0'}}><h3 style={{margin:0,fontSize:13,fontWeight:700,color:'#1b2e22'}}>Budget Narrative / Justification</h3></div>
        <div style={{padding:20}}><textarea value={narrative} onChange={e=>{setNarrative(e.target.value);setSaved(false);}} rows={5} placeholder="Describe the rationale for your FY2027 budget request, key initiatives, staffing changes, and relevant context..." style={{width:'100%',padding:'10px 12px',borderRadius:7,border:'1.5px solid #c8ddd4',fontSize:12,fontFamily:'Figtree,sans-serif',lineHeight:1.6,resize:'vertical',boxSizing:'border-box'}}/></div>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <button onClick={()=>handleSave(false)} disabled={saving} style={{background:'#fff',border:'1.5px solid #c8ddd4',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#2d6a4f',cursor:'pointer',opacity:saving?0.6:1}}>{saving?'Saving…':'Save Draft'}</button>
        <button onClick={()=>handleSave(true)} disabled={saving} style={{background:'#1b3a2a',border:'none',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer',opacity:saving?0.6:1}}>{saving?'Saving…':'Submit to Town Manager →'}</button>
      </div>
    </div>
  );
}

// ── INTERNAL: Capital Request Form ────────────────────────────────────────────
function CapitalRequestForm({deptId,onNav,refreshData}){
  const dept=DEPARTMENTS.find(d=>d.id===deptId);
  const [form,setForm]=useState({name:'',category:'Equipment',description:'',priority:'medium',funding:'General Fund',fy27:'',fy28:'',fy29:''});
  const [submitted,setSubmitted]=useState(false);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState('');
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const inp={width:'100%',padding:'8px 12px',borderRadius:7,border:'1.5px solid #c8ddd4',fontSize:12,fontFamily:'Figtree,sans-serif',boxSizing:'border-box'};
  async function handleSubmit(){
    if(!form.name.trim()||!form.description.trim()){setError('Project Name and Description are required.');return;}
    setSaving(true);setError('');
    if(_supa){
      try{
        const years=[];
        if(form.fy27)years.push({year:'FY2027',amount:parseInt(form.fy27)||0});
        if(form.fy28)years.push({year:'FY2028',amount:parseInt(form.fy28)||0});
        if(form.fy29)years.push({year:'FY2029',amount:parseInt(form.fy29)||0});
        const {error:insErr}=await _supa.from('capital_projects').insert({
          id:`cap_${deptId}_${Date.now()}`,name:form.name,department:deptId,
          description:form.description,category:form.category,priority:form.priority,
          funding_source:form.funding,status:'under_review',
          total:years.reduce((s,y)=>s+y.amount,0),years
        });
        if(insErr)throw insErr;
        await loadAllData();
        if(refreshData)refreshData();
      }catch(e){setError(e.message||'Submit failed');setSaving(false);return;}
    }
    setSaving(false);setSubmitted(true);
  }
  if(submitted)return(
    <div style={{padding:'32px 36px',maxWidth:700}}>
      <div style={{background:'#e8f5e9',borderRadius:12,padding:'40px 32px',textAlign:'center',border:'1px solid #c8e6c9'}}>
        <div style={{fontSize:36,marginBottom:10,color:'#2d6a4f'}}>✓</div>
        <h2 style={{margin:'0 0 8px',fontSize:20,fontWeight:700,color:'#1b3a2a',fontFamily:"'Source Serif 4',serif"}}>Capital Request Submitted</h2>
        <p style={{margin:'0 0 22px',color:'#4a6a58',fontSize:13}}>Your capital project request has been submitted for Town Manager review.</p>
        <button onClick={()=>onNav('dept/dashboard')} style={{background:'#1b3a2a',color:'#fff',border:'none',borderRadius:8,padding:'9px 22px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Back to Dashboard</button>
      </div>
    </div>
  );
  return(
    <div style={{padding:'32px 36px',maxWidth:800}}>
      <button onClick={()=>onNav('dept/dashboard')} style={{background:'none',border:'none',color:'#5a7a66',fontSize:12,cursor:'pointer',padding:0,marginBottom:18}}>← Back to Dashboard</button>
      <h1 style={{margin:'0 0 4px',fontSize:24,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>New Capital Project Request</h1>
      <p style={{margin:'0 0 22px',color:'#5a7a66',fontSize:13}}>Department: {dept?.name} — FY2027 Capital Improvement Plan</p>
      {error&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'9px 14px',marginBottom:14,color:'#880e4f',fontSize:12}}>{error}</div>}
      {DEMO_MODE&&<div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:8,padding:'9px 14px',marginBottom:14,fontSize:11,color:'#856404'}}><strong>Demo mode:</strong> This request will not be saved. Configure Supabase to enable persistence.</div>}
      <Card>
        <div style={{padding:26,display:'flex',flexDirection:'column',gap:18}}>
          <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Project Name *</label><input value={form.name} onChange={e=>setF('name',e.target.value)} placeholder="e.g. Ladder Truck Replacement" style={inp}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Category</label><select value={form.category} onChange={e=>setF('category',e.target.value)} style={{...inp,background:'#fff'}}>{'Equipment,Infrastructure,Buildings & Facilities,Technology,Parks & Recreation,Planning & Studies'.split(',').map(c=><option key={c}>{c}</option>)}</select></div>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Priority</label><select value={form.priority} onChange={e=>setF('priority',e.target.value)} style={{...inp,background:'#fff'}}><option value="high">High — Safety / Legal / Compliance</option><option value="medium">Medium — Operational Need</option><option value="low">Low — Desirable Improvement</option></select></div>
          </div>
          <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Project Description *</label><textarea value={form.description} onChange={e=>setF('description',e.target.value)} rows={4} placeholder="Describe the project scope, current problem being addressed, and expected outcome..." style={{...inp,resize:'vertical',lineHeight:1.6}}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Proposed Funding Source</label><select value={form.funding} onChange={e=>setF('funding',e.target.value)} style={{...inp,background:'#fff'}}>{'General Fund,Borrowing,Free Cash / Stabilization,Enterprise Fund,Federal/State Grant,CPA Funds,Borrowing / Federal Aid (80%)'.split(',').map(s=><option key={s}>{s}</option>)}</select></div>
          <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Estimated Cost by Year</label><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>{['fy27','fy28','fy29'].map((yr,i)=><div key={yr}><div style={{fontSize:10,color:'#7a9a86',marginBottom:4,fontWeight:600}}>FY{2027+i}</div><input type="number" value={form[yr]} onChange={e=>setF(yr,e.target.value)} placeholder="$0" style={inp}/></div>)}</div></div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:10,paddingTop:4}}>
            <button onClick={()=>onNav('dept/dashboard')} style={{background:'#fff',border:'1.5px solid #c8ddd4',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#555',cursor:'pointer'}}>Cancel</button>
            <button onClick={handleSubmit} disabled={saving} style={{background:'#1b3a2a',border:'none',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer',opacity:saving?0.6:1}}>{saving?'Submitting…':'Submit Request →'}</button>
          </div>
        </div>
      </Card>
    </div>
  );
}

// ── INTERNAL: TM Dept Review ──────────────────────────────────────────────────
function TMDeptReview({deptId,onNav,refreshData}){
  const dept=DEPARTMENTS.find(d=>d.id===deptId)||DEPARTMENTS[0];
  const [items,setItems]=useState(dept.lineItems.map(li=>({...li,fy27_recommended:li.fy27_recommended??li.fy27_request})));
  const [note,setNote]=useState(dept.tm_note||'');
  const [status,setStatus]=useState(dept.request_status);
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState('');
  const totalReq=items.reduce((s,li)=>s+li.fy27_request,0);
  const totalRec=items.reduce((s,li)=>s+(li.fy27_recommended??li.fy27_request),0);
  const savings=totalReq-totalRec;
  async function handleSave(){
    setSaving(true);setError('');
    if(_supa){
      try{
        const[dErr,liErrs]=await Promise.all([
          _supa.from('departments').update({tm_note:note,request_status:status,fy27_recommended:totalRec}).eq('id',deptId).then(r=>r.error),
          Promise.all(items.filter(li=>li._db_id).map(li=>_supa.from('line_items').update({fy27_recommended:li.fy27_recommended??li.fy27_request}).eq('id',li._db_id).then(r=>r.error)))
        ]);
        if(dErr||(liErrs||[]).some(Boolean))throw new Error('Save failed — check console');
        await loadAllData();
        if(refreshData)refreshData();
      }catch(e){setError(e.message||'Save failed');setSaving(false);return;}
    }
    setSaving(false);setSaved(true);
    setTimeout(()=>onNav('tm/dashboard'),1200);
  }
  return(
    <div style={{padding:'32px 36px',maxWidth:1000}}>
      <button onClick={()=>onNav('tm/dashboard')} style={{background:'none',border:'none',color:'#5a7a66',fontSize:12,cursor:'pointer',padding:0,marginBottom:18}}>← Back to TM Dashboard</button>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}><div><h1 style={{margin:'0 0 4px',fontSize:24,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>{dept.name}</h1><p style={{margin:0,color:'#5a7a66',fontSize:13}}>Budget review — FY2027</p></div><StatusPill status={status}/></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
        <StatCard label="FY2026 Approved" value={fmtFull(dept.fy26_approved)} sub="Baseline"/>
        <StatCard label="Dept Request" value={fmtFull(totalReq)} sub={`+${pctChg(dept.fy26_approved,totalReq).toFixed(1)}% vs prior`}/>
        <StatCard label="TM Recommendation" value={fmtFull(totalRec)} sub={savings>0?`${fmtFull(savings)} below request`:'Matches request'} accent={savings>0}/>
        <StatCard label="vs. Prior Year" value={`${pctChg(dept.fy26_approved,totalRec)>0?'+':''}${pctChg(dept.fy26_approved,totalRec).toFixed(1)}%`} sub="Recommended change"/>
      </div>

        <div style={{padding:'14px 20px',borderBottom:'1px solid #eef3f0'}}><h3 style={{margin:0,fontSize:13,fontWeight:700,color:'#1b2e22'}}>Line Item Review</h3><p style={{margin:'3px 0 0',fontSize:11,color:'#7a9a86'}}>Enter TM recommendation. Leave as-is to accept department request.</p></div>

// ── INTERNAL: TM Capital & Publish ────────────────────────────────────────────
function TMCapitalReview({refreshData}){

  const [notes,setNotes]=useState({});
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);
  async function handleSave(){
    setSaving(true);
    if(_supa){
      const updates=[
        ...Object.entries(statuses).map(([id,status])=>_supa.from('capital_projects').update({status}).eq('id',id)),
        ...Object.entries(notes).map(([id,tm_note])=>_supa.from('capital_projects').update({tm_note}).eq('id',id)),

      await Promise.all(updates);
      await loadAllData();

// ── INTERNAL: TM Department Manager ──────────────────────────────────────────
function TMDepartmentManager({onNav,refreshData}){
  const [view,setView]=useState('list');
  const [editDept,setEditDept]=useState(null);
  const emptyForm={id:'',name:'',shortName:'',category:'general_govt',head:'',phone:'',email:'',mission:'',highlights:''};
  const [form,setForm]=useState(emptyForm);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [error,setError]=useState('');
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const inp={width:'100%',padding:'8px 12px',borderRadius:7,border:'1.5px solid #c8ddd4',fontSize:12,fontFamily:'Figtree,sans-serif',boxSizing:'border-box'};

  function startEdit(dept){
    setForm({id:dept.id,name:dept.name,shortName:dept.shortName||'',category:dept.category||'general_govt',head:dept.head||'',phone:dept.phone||'',email:dept.email||'',mission:dept.mission||'',highlights:(dept.highlights||[]).join('\n')});
    setEditDept(dept);setView('edit');setSaved(false);setError('');
  }
  function startCreate(){setForm(emptyForm);setEditDept(null);setView('create');setSaved(false);setError('');}

  async function handleSave(){
    if(!form.name.trim()){setError('Department name is required.');return;}
    setSaving(true);setError('');
    const highlights=form.highlights.split('\n').map(s=>s.trim()).filter(Boolean);
    const payload={name:form.name,short_name:form.shortName||form.name,category:form.category,head:form.head,phone:form.phone,email:form.email,mission:form.mission,highlights};
    if(view==='create'){
      const base=form.id.trim()||form.name.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,16);
      const newId=DEPARTMENTS.find(d=>d.id===base)?`${base}_${Date.now()%10000}`:base;
      if(_supa){
        const{error:insErr}=await _supa.from('departments').insert({id:newId,...payload,fy25_actual:0,fy26_approved:0,fy27_request:0,request_status:'not_started'});
        if(insErr){
          const isDupe=insErr.code==='23505'||insErr.message.toLowerCase().includes('duplicate')||insErr.message.toLowerCase().includes('unique');
          setError(isDupe?`Department ID "${newId}" already exists. Please specify a unique ID in the ID field.`:insErr.message);
          setSaving(false);return;
        }
        await loadAllData();if(refreshData)refreshData();
      }else{
        if(DEPARTMENTS.find(d=>d.id===newId)){setError(`Department ID "${newId}" already exists. Please specify a unique ID.`);setSaving(false);return;}
        DEPARTMENTS.push({id:newId,name:payload.name,shortName:payload.short_name,category:payload.category,head:payload.head,phone:payload.phone,email:payload.email,mission:payload.mission,highlights,fy25_actual:0,fy26_approved:0,fy27_request:0,fy27_recommended:null,fy27_approved:null,request_status:'not_started',request_note:'',tm_note:null,lineItems:[]});
      }
    }else{
      if(_supa){
        const{error:updErr}=await _supa.from('departments').update(payload).eq('id',editDept.id);
        if(updErr){setError(updErr.message);setSaving(false);return;}
        await loadAllData();if(refreshData)refreshData();
      }else{
        const idx=DEPARTMENTS.findIndex(d=>d.id===editDept.id);
        if(idx>=0)DEPARTMENTS[idx]={...DEPARTMENTS[idx],name:payload.name,shortName:payload.short_name,category:payload.category,head:payload.head,phone:payload.phone,email:payload.email,mission:payload.mission,highlights};
      }
    }
    setSaving(false);setSaved(true);
    setTimeout(()=>{setView('list');setSaved(false);},1000);
  }

  if(view!=='list')return(
    <div style={{padding:'32px 36px',maxWidth:800}}>
      <button onClick={()=>setView('list')} style={{background:'none',border:'none',color:'#5a7a66',fontSize:12,cursor:'pointer',padding:0,marginBottom:18}}>← Back to Departments</button>
      <h1 style={{margin:'0 0 4px',fontSize:24,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>{view==='create'?'New Department':'Edit Department'}</h1>
      <p style={{margin:'0 0 22px',color:'#5a7a66',fontSize:13}}>{view==='create'?'Add a new department to the budget system.':'Update department information and settings.'}</p>
      {saved&&<div style={{background:'#e8f5e9',border:'1px solid #c8e6c9',borderRadius:8,padding:'10px 16px',marginBottom:16,color:'#2e7d32',fontWeight:600,fontSize:12}}>Saved successfully.</div>}
      {error&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',marginBottom:16,color:'#880e4f',fontSize:12}}>{error}</div>}
      {DEMO_MODE&&<div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:8,padding:'9px 14px',marginBottom:14,fontSize:11,color:'#856404'}}><strong>Demo mode:</strong> Changes update in-memory data only.</div>}
      <Card>
        <div style={{padding:26,display:'flex',flexDirection:'column',gap:16}}>
          {view==='create'&&<div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Department ID <span style={{color:'#888',fontWeight:400,textTransform:'none'}}>(auto-generated if blank)</span></label><input value={form.id} onChange={e=>setF('id',e.target.value)} placeholder="e.g. parks_rec" style={inp}/></div>}
          <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:14}}>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Department Name *</label><input value={form.name} onChange={e=>setF('name',e.target.value)} placeholder="e.g. Parks & Recreation" style={inp}/></div>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Short Name</label><input value={form.shortName} onChange={e=>setF('shortName',e.target.value)} placeholder="e.g. Parks" style={inp}/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Category</label><select value={form.category} onChange={e=>setF('category',e.target.value)} style={{...inp,background:'#fff'}}>{Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Department Head</label><input value={form.head} onChange={e=>setF('head',e.target.value)} placeholder="e.g. Jane Smith, Director" style={inp}/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Phone</label><input value={form.phone} onChange={e=>setF('phone',e.target.value)} placeholder="(508) 000-0000" style={inp}/></div>
            <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Email</label><input value={form.email} onChange={e=>setF('email',e.target.value)} placeholder="dept@suttonma.org" style={inp}/></div>
          </div>
          <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Mission Statement</label><textarea value={form.mission} onChange={e=>setF('mission',e.target.value)} rows={3} placeholder="Describe the department's core purpose and responsibilities..." style={{...inp,resize:'vertical',lineHeight:1.6}}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:5,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Highlights <span style={{color:'#888',fontWeight:400,textTransform:'none'}}>(one per line)</span></label><textarea value={form.highlights} onChange={e=>setF('highlights',e.target.value)} rows={3} placeholder="Key accomplishments or statistics, one per line..." style={{...inp,resize:'vertical',lineHeight:1.6}}/></div>
        </div>
      </Card>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
        <button onClick={()=>setView('list')} style={{background:'#fff',border:'1.5px solid #c8ddd4',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#555',cursor:'pointer'}}>Cancel</button>
        <button onClick={handleSave} disabled={saving} style={{background:'#1b3a2a',border:'none',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer',opacity:saving?0.6:1}}>{saving?'Saving…':view==='create'?'Create Department →':'Save Changes →'}</button>

      <Card style={{overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>

  );
}

function TMUserManagement(){

  const [inviting,setInviting]=useState(false);
  const [inviteMsg,setInviteMsg]=useState('');
  const [error,setError]=useState('');
  const [editingId,setEditingId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const inp={width:'100%',padding:'7px 10px',borderRadius:6,border:'1.5px solid #c8ddd4',fontSize:12,fontFamily:'Figtree,sans-serif',boxSizing:'border-box'};

  useEffect(()=>{
    if(!_supa)return;
    _supa.from('profiles').select('*').then(({data,error:e})=>{if(!e&&data)setLiveUsers(data);setLoadingUsers(false);});
  },[]);

  const displayUsers=liveUsers||demoUsers;
  const setIF=(k,v)=>setInviteForm(f=>({...f,[k]:v}));

  async function handleAddStaff(){
    if(!inviteForm.email.trim()){setError('Email is required.');return;}
    setInviting(true);setError('');setInviteMsg('');
    if(_supa){
      setInviteMsg('To create a new staff account, go to your Supabase Dashboard → Authentication → Users → Invite User. Enter their email and set the role/dept_id in the profiles table once they accept.');
    }else{
      const newUser={id:`u${Date.now()}`,display_name:inviteForm.display_name,email:inviteForm.email,role:inviteForm.role,dept_id:inviteForm.dept_id};
      setDemoUsers(prev=>[...prev,newUser]);
      setInviteMsg(`Staff member ${inviteForm.display_name||inviteForm.email} added (demo only).`);
    }
    setInviting(false);setShowInvite(false);setInviteForm({email:'',display_name:'',dept_id:'',role:'dept_head'});
  }

  async function handleUpdateUser(userId,updates){
    if(_supa){
      const{error:updErr}=await _supa.from('profiles').update(updates).eq('id',userId);
      if(updErr){setError(updErr.message);return;}
      setLiveUsers(prev=>prev.map(u=>u.id===userId?{...u,...updates}:u));
    }else{
      setDemoUsers(prev=>prev.map(u=>u.id===userId?{...u,...updates}:u));
    }

  }

    <div style={{padding:'32px 36px',maxWidth:1000}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>

      </div>
      {DEMO_MODE&&<div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:11,color:'#856404'}}><strong>Demo mode:</strong> In live mode, staff accounts are managed via Supabase authentication. Changes here are in-memory only.</div>}
      {inviteMsg&&<div style={{background:'#e3f2fd',border:'1px solid #90caf9',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:12,color:'#0d47a1',lineHeight:1.6}}>{inviteMsg}</div>}
      {error&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',marginBottom:16,color:'#880e4f',fontSize:12}}>{error}</div>}
      {showInvite&&(
        <Card style={{marginBottom:22,border:'2px solid #2d6a4f'}}>
          <div style={{padding:'14px 20px',borderBottom:'1px solid #eef3f0'}}><h3 style={{margin:0,fontSize:13,fontWeight:700,color:'#1b2e22'}}>Add Staff Member</h3></div>
          <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label style={{fontSize:10,fontWeight:700,color:'#3a5444',marginBottom:4,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Email *</label><input type="email" value={inviteForm.email} onChange={e=>setIF('email',e.target.value)} placeholder="staff@suttonma.org" style={inp}/></div>
            <div><label style={{fontSize:10,fontWeight:700,color:'#3a5444',marginBottom:4,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Display Name</label><input value={inviteForm.display_name} onChange={e=>setIF('display_name',e.target.value)} placeholder="First Last, Title" style={inp}/></div>
            <div><label style={{fontSize:10,fontWeight:700,color:'#3a5444',marginBottom:4,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Department Access</label><select value={inviteForm.dept_id} onChange={e=>setIF('dept_id',e.target.value)} style={{...inp,background:'#fff'}}><option value="">— All (Town Manager) —</option>{DEPARTMENTS.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
            <div><label style={{fontSize:10,fontWeight:700,color:'#3a5444',marginBottom:4,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Role</label><select value={inviteForm.role} onChange={e=>setIF('role',e.target.value)} style={{...inp,background:'#fff'}}><option value="dept_head">Department Head / Staff</option><option value="town_manager">Town Manager (Super-Admin)</option></select></div>
          </div>
          <div style={{padding:'0 20px 16px',display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>setShowInvite(false)} style={{background:'#fff',border:'1.5px solid #c8ddd4',borderRadius:7,padding:'7px 16px',fontSize:12,fontWeight:600,color:'#555',cursor:'pointer'}}>Cancel</button>
            <button onClick={handleAddStaff} disabled={inviting} style={{background:'#1b3a2a',border:'none',borderRadius:7,padding:'7px 16px',fontSize:12,fontWeight:600,color:'#fff',cursor:'pointer',opacity:inviting?0.6:1}}>{inviting?'Adding…':'Add Staff Member →'}</button>
          </div>
        </Card>
      )}
      {loadingUsers?(
        <div style={{textAlign:'center',padding:40,color:'#5a7a66',fontSize:13}}>Loading users…</div>
      ):(
        <Card style={{overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{background:'#f2f7f4',borderBottom:'1px solid #dde8e2'}}>
              <th style={{...thStyle,paddingLeft:20}}>Name / Email</th>
              <th style={thStyle}>Role</th>
              <th style={thStyle}>Department Access</th>
              <th style={{...thStyle,paddingRight:16}}></th>
            </tr></thead>
            <tbody>
              {displayUsers.map((u,i)=>(
                <tr key={u.id} style={{borderBottom:i<displayUsers.length-1?'1px solid #eef3f0':'none'}}>
                  <td style={{...tdStyle,paddingLeft:20}}><div style={{fontWeight:600,color:'#1b2e22'}}>{u.display_name||u.email}</div><div style={{fontSize:10,color:'#8aaa96'}}>{u.email||u.id}</div></td>
                  <td style={tdStyle}>
                    {editingId===u.id?(
                      <select value={editForm.role||u.role} onChange={e=>setEditForm(f=>({...f,role:e.target.value}))} style={{padding:'3px 7px',borderRadius:5,border:'1px solid #c8ddd4',fontSize:11,fontFamily:'Figtree,sans-serif',background:'#fff'}}>
                        <option value="dept_head">Department Head</option>
                        <option value="town_manager">Town Manager</option>
                      </select>
                    ):(
                      <span style={{fontSize:11,padding:'2px 8px',borderRadius:10,background:u.role==='town_manager'?'#1b3a2a':'#e8f5ee',color:u.role==='town_manager'?'#fff':'#2d6a4f',fontWeight:600}}>{u.role==='town_manager'?'Town Manager':'Dept Head'}</span>
                    )}
                  </td>
                  <td style={tdStyle}>
                    {editingId===u.id?(
                      <select value={editForm.dept_id??u.dept_id??''} onChange={e=>setEditForm(f=>({...f,dept_id:e.target.value}))} style={{padding:'3px 7px',borderRadius:5,border:'1px solid #c8ddd4',fontSize:11,fontFamily:'Figtree,sans-serif',background:'#fff'}}>
                        <option value="">— All (Town Manager) —</option>
                        {DEPARTMENTS.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}

                      <span style={{color:'#5a7a66',fontSize:12}}>{u.dept_id?DEPARTMENTS.find(d=>d.id===u.dept_id)?.name||u.dept_id:'All Departments'}</span>

                  <td style={{...tdStyle,paddingRight:16}}>
                    {editingId===u.id?(
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>handleUpdateUser(u.id,editForm)} style={{fontSize:11,fontWeight:600,color:'#fff',background:'#2d6a4f',border:'none',borderRadius:5,padding:'4px 9px',cursor:'pointer'}}>Save</button>
                        <button onClick={()=>setEditingId(null)} style={{fontSize:11,fontWeight:600,color:'#555',background:'#f2f7f4',border:'1px solid #c8ddd4',borderRadius:5,padding:'4px 9px',cursor:'pointer'}}>Cancel</button>
                      </div>
                    ):(
                      <button onClick={()=>{setEditingId(u.id);setEditForm({role:u.role,dept_id:u.dept_id||''});}} style={{fontSize:11,fontWeight:600,color:'#2d6a4f',background:'#e8f5ee',border:'none',borderRadius:5,padding:'4px 9px',cursor:'pointer'}}>Edit</button>
                    )}

                </tr>
              ))}
            </tbody>

        </Card>
      )}
      {!DEMO_MODE&&<div style={{marginTop:14,padding:'12px 16px',background:'#f2f7f4',borderRadius:8,fontSize:11,color:'#5a7a66',lineHeight:1.6}}><strong>Note:</strong> To create new staff accounts, go to your Supabase Dashboard → Authentication → Users → Invite User. Use their @suttonma.org email. Once they accept and sign in, their profile will appear here for department assignment.</div>}
    </div>
  );
}

// ── INTERNAL: TM Data Upload ──────────────────────────────────────────────────
function TMDataUpload({onNav,refreshData}){
  const [type,setType]=useState('operating');
  const [csvText,setCsvText]=useState('');
  const [preview,setPreview]=useState(null);
  const [importing,setImporting]=useState(false);
  const [imported,setImported]=useState(false);
  const [error,setError]=useState('');

  const OPERATING_TMPL=`dept_id,fy25_actual,fy26_approved,fy27_request\ntm,412000,438000,465000\ntreasurer,348000,362000,385000\nfire,1942000,2048000,2185000`;
  const CAPITAL_TMPL=`id,name,department,category,priority,funding_source,status,fy2027,fy2028,fy2029,description\ncap_new001,New Equipment Purchase,dpw,Equipment,high,General Fund,planned,150000,0,0,Replace aging equipment`;

  function parseCSVLine(line){
    const result=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur.trim());cur='';}else{cur+=ch;}}
    result.push(cur.trim());return result;
  }

  function parseCSV(text){
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2)return[];
    const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase());
    return lines.slice(1).map(line=>{const vals=parseCSVLine(line);const row={};headers.forEach((h,i)=>row[h]=vals[i]||'');return row;});
  }

  function handlePreview(){
    setError('');setPreview(null);
    if(!csvText.trim()){setError('Please paste CSV data or upload a file.');return;}
    const rows=parseCSV(csvText);
    if(!rows.length){setError('No valid rows found. Check CSV format.');return;}
    if(type==='operating'){
      const valid=rows.filter(r=>r.dept_id);
      const deptIdSet=new Set(DEPARTMENTS.map(d=>d.id));
      const matched=valid.filter(r=>deptIdSet.has(r.dept_id));
      const unmatched=valid.filter(r=>!deptIdSet.has(r.dept_id));
      setPreview({rows:valid,matched,unmatched});
    }else{
      const valid=rows.filter(r=>r.id&&r.name);
      setPreview({rows:valid});
    }
  }

  async function handleImport(){
    if(!preview)return;
    setImporting(true);setError('');
    if(type==='operating'){
      if(_supa){
        const results=await Promise.all(preview.matched.map(r=>_supa.from('departments').update({fy25_actual:parseInt(r.fy25_actual)||0,fy26_approved:parseInt(r.fy26_approved)||0,fy27_request:parseInt(r.fy27_request)||0}).eq('id',r.dept_id)));
        const err=results.find(r=>r.error);
        if(err){setError('Import error: '+err.error.message);setImporting(false);return;}
        await loadAllData();if(refreshData)refreshData();
      }else{
        preview.matched.forEach(r=>{const dept=DEPARTMENTS.find(d=>d.id===r.dept_id);if(dept){dept.fy25_actual=parseInt(r.fy25_actual)||dept.fy25_actual;dept.fy26_approved=parseInt(r.fy26_approved)||dept.fy26_approved;dept.fy27_request=parseInt(r.fy27_request)||dept.fy27_request;}});
      }
    }else{
      if(_supa){
        const results=await Promise.all(preview.rows.map(r=>{const years=[];if(parseInt(r.fy2027))years.push({year:'FY2027',amount:parseInt(r.fy2027)});if(parseInt(r.fy2028))years.push({year:'FY2028',amount:parseInt(r.fy2028)});if(parseInt(r.fy2029))years.push({year:'FY2029',amount:parseInt(r.fy2029)});return _supa.from('capital_projects').upsert({id:r.id,name:r.name,department:r.department||null,category:r.category||'',priority:r.priority||'medium',funding_source:r.funding_source||'',status:r.status||'under_review',description:r.description||'',total:years.reduce((s,y)=>s+y.amount,0),years});}));
        const err=results.find(r=>r.error);
        if(err){setError('Import error: '+err.error.message);setImporting(false);return;}
        await loadAllData();if(refreshData)refreshData();
      }else{
        preview.rows.forEach(r=>{const years=[];if(parseInt(r.fy2027))years.push({year:'FY2027',amount:parseInt(r.fy2027)});if(parseInt(r.fy2028))years.push({year:'FY2028',amount:parseInt(r.fy2028)});if(parseInt(r.fy2029))years.push({year:'FY2029',amount:parseInt(r.fy2029)});const proj={id:r.id,name:r.name,department:r.department||null,description:r.description||'',category:r.category||'',priority:r.priority||'medium',funding_source:r.funding_source||'',status:r.status||'under_review',total:years.reduce((s,y)=>s+y.amount,0),years};const idx=CAPITAL_PROJECTS.findIndex(p=>p.id===r.id);if(idx>=0)CAPITAL_PROJECTS[idx]=proj;else CAPITAL_PROJECTS.push(proj);});
      }
    }
    setImporting(false);setImported(true);
    setCsvText('');setPreview(null);
  }

  function handleFileUpload(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>setCsvText(ev.target.result);
    reader.readAsText(file);
  }

  if(imported)return(
    <div style={{padding:'32px 36px',maxWidth:700}}>
      <div style={{background:'#e8f5e9',borderRadius:12,padding:'40px 32px',textAlign:'center',border:'1px solid #c8e6c9'}}>
        <div style={{fontSize:36,marginBottom:10,color:'#2d6a4f'}}>✓</div>
        <h2 style={{margin:'0 0 8px',fontSize:20,fontWeight:700,color:'#1b3a2a',fontFamily:"'Source Serif 4',serif"}}>Data Imported Successfully</h2>
        <p style={{margin:'0 0 22px',color:'#4a6a58',fontSize:13}}>The budget data has been imported and is now reflected in the portal.</p>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button onClick={()=>setImported(false)} style={{background:'#fff',border:'1.5px solid #c8ddd4',borderRadius:8,padding:'9px 20px',fontSize:12,fontWeight:600,color:'#2d6a4f',cursor:'pointer'}}>Import More Data</button>
          <button onClick={()=>onNav('tm/dashboard')} style={{background:'#1b3a2a',color:'#fff',border:'none',borderRadius:8,padding:'9px 22px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Back to Dashboard →</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{padding:'32px 36px',maxWidth:900}}>
      <h1 style={{margin:'0 0 4px',fontSize:26,fontWeight:700,color:'#1b2e22',fontFamily:"'Source Serif 4',serif"}}>Upload Historical Data</h1>
      <p style={{margin:'0 0 22px',color:'#5a7a66',fontSize:13}}>Import prior year budgets, actuals, and capital project data from CSV files</p>
      {DEMO_MODE&&<div style={{background:'#fff3cd',border:'1px solid #ffc107',borderRadius:8,padding:'9px 14px',marginBottom:14,fontSize:11,color:'#856404'}}><strong>Demo mode:</strong> Data will update in-memory only. Connect Supabase for persistence.</div>}
      {error&&<div style={{background:'#fce4ec',border:'1px solid #f48fb1',borderRadius:8,padding:'10px 16px',marginBottom:16,color:'#880e4f',fontSize:12}}>{error}</div>}
      <Card style={{marginBottom:18}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #eef3f0'}}><h3 style={{margin:0,fontSize:13,fontWeight:700,color:'#1b2e22'}}>Data Type</h3></div>
        <div style={{padding:'16px 20px',display:'flex',gap:12}}>
          {[['operating','Operating Budget','Department budget figures (actuals, approved, requests)'],['capital','Capital Projects','Capital improvement plan projects']].map(([t,l,d])=>(
            <button key={t} onClick={()=>{setType(t);setPreview(null);setCsvText('');}} style={{flex:1,padding:'14px 16px',borderRadius:8,border:`2px solid ${type===t?'#2d6a4f':'#dde8e2'}`,background:type===t?'#e8f5ee':'#fff',cursor:'pointer',textAlign:'left'}}>
              <div style={{fontSize:13,fontWeight:700,color:type===t?'#1b3a2a':'#1b2e22',marginBottom:3}}>{l}</div>
              <div style={{fontSize:11,color:'#5a7a66'}}>{d}</div>
            </button>
          ))}
        </div>
      </Card>
      <Card style={{marginBottom:18}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #eef3f0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{margin:0,fontSize:13,fontWeight:700,color:'#1b2e22'}}>CSV Data</h3>
          <button onClick={()=>setCsvText(type==='operating'?OPERATING_TMPL:CAPITAL_TMPL)} style={{fontSize:11,color:'#2d6a4f',background:'#e8f5ee',border:'none',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontWeight:600}}>Load Template</button>
        </div>
        <div style={{padding:20}}>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:'#3a5444',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:'0.05em'}}>Upload CSV File</label>
            <input type="file" accept=".csv,.txt" onChange={handleFileUpload} style={{fontSize:12,fontFamily:'Figtree,sans-serif'}}/>
          </div>

function SealMark({size=28}){return<svg width={size} height={size} viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5"/><circle cx="20" cy="20" r="13" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" strokeWidth="1"/><path d="M20 8 L22.5 15.5 L30.5 15.5 L24.5 20.5 L27 28 L20 23 L13 28 L15.5 20.5 L9.5 15.5 L17.5 15.5 Z" fill="oklch(0.72 0.12 82)" opacity="0.9"/></svg>;}

function AuthForm({title,onSuccess}){
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const inp={width:'100%',padding:'9px 12px',borderRadius:7,border:'1px solid rgba(255,255,255,0.18)',background:'rgba(0,0,0,0.3)',color:'#fff',fontSize:12,fontFamily:'Figtree,sans-serif',boxSizing:'border-box',marginBottom:8,outline:'none'};
  async function handleSignIn(e){
    e.preventDefault();setLoading(true);setError('');
    const{data,error:authErr}=await _supa.auth.signInWithPassword({email,password});
    if(authErr){setError(authErr.message);setLoading(false);return;}
    const{data:profile,error:profErr}=await _supa.from('profiles').select('*').eq('id',data.user.id).single();
    if(profErr||!profile){setError('Account found but no role assigned. Contact your administrator.');await _supa.auth.signOut();setLoading(false);return;}
    onSuccess(profile.role==='town_manager'?'tm':'dept',profile.dept_id||null);
  }
  return(
    <form onSubmit={handleSignIn} style={{display:'flex',flexDirection:'column'}}>
      <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Email</div>
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@suttonma.org" style={inp} required/>
      <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Password</div>
      <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" style={inp} required/>
      {error&&<div style={{fontSize:11,color:'#ffb3b3',marginBottom:8,lineHeight:1.4}}>{error}</div>}
      <button type="submit" disabled={loading} style={{marginTop:4,width:'100%',padding:'9px',background:title==='dept'?'oklch(0.72 0.12 82)':'rgba(255,255,255,0.15)',border:'none',borderRadius:8,color:title==='dept'?'#1b2000':'#fff',fontSize:12,fontWeight:700,cursor:'pointer',opacity:loading?0.6:1}}>{loading?'Signing in…':'Sign In →'}</button>
    </form>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function getSavedState(){try{return JSON.parse(localStorage.getItem('openbook_state')||'null');}catch{return null;}}

function App(){
  const saved=getSavedState();
  const [role,setRole]=useState('public');
  const [deptId,setDeptId]=useState(null);
  const [view,setView]=useState(saved?.view||'public/dashboard');
  const [viewParam,setViewParam]=useState(saved?.viewParam||null);
  const [tweaks,setTweaks]=useState(false);
  const [loading,setLoading]=useState(!DEMO_MODE);
  const [tick,setTick]=useState(0);

  const refreshData=useCallback(()=>{setTick(t=>t+1);},[]);

  // On mount: restore session (live mode) or localStorage role (demo mode)
  useEffect(()=>{
    if(DEMO_MODE){
      const s=getSavedState();
      setRole(s?.role||'public');setDeptId(s?.deptId||null);
      return;
    }
    // Live mode: check existing Supabase session
    _supa.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const{data:profile}=await _supa.from('profiles').select('*').eq('id',session.user.id).single();
        if(profile){
          const r=profile.role==='town_manager'?'tm':'dept';
          setRole(r);setDeptId(profile.dept_id||null);
          setView(r==='tm'?'tm/dashboard':'dept/dashboard');
        }
      }
      await loadAllData();
      setLoading(false);
    });
    const{data:{subscription}}=_supa.auth.onAuthStateChange((event)=>{
      if(event==='SIGNED_OUT'){setRole(null);setDeptId(null);setView('public/dashboard');}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Re-fetch data when refreshData is triggered (live mode only)
  useEffect(()=>{
    if(!DEMO_MODE&&_supa&&tick>0){loadAllData();}
  },[tick]);

  useEffect(()=>{try{localStorage.setItem('openbook_state',JSON.stringify({role,deptId,view,viewParam}));}catch{};},[role,deptId,view,viewParam]);
  useEffect(()=>{
    window.addEventListener('message',e=>{if(e.data?.type==='__activate_edit_mode')setTweaks(true);if(e.data?.type==='__deactivate_edit_mode')setTweaks(false);});
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  function login(r,d){setRole(r);setDeptId(d);setView(r==='public'?'public/dashboard':r==='dept'?'dept/dashboard':'tm/dashboard');setViewParam(null);}
  function nav(v,p=null){setView(v);setViewParam(p);}
  async function handleSwitch(){
    if(_supa&&role!=='public')await _supa.auth.signOut();
    setRole(null);setDeptId(null);
  }

  if(loading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'oklch(0.22 0.07 155)',flexDirection:'column',gap:14}}>
      <SealMark size={48}/>
      <div style={{color:'rgba(255,255,255,0.6)',fontSize:13,fontFamily:'Figtree,sans-serif'}}>Loading OpenBook…</div>
    </div>
  );

  if(!role)return<LoginScreen onLogin={login}/>;

  function renderView(){
    switch(view){
      case'public/dashboard':return<PublicDashboard onNav={nav}/>;
      case'public/departments':return<DepartmentList onNav={nav}/>;
      case'public/department':return<DepartmentDetail deptId={viewParam} onNav={nav}/>;
      case'public/enterprise':return<EnterpriseFunds/>;
      case'public/capital':return<CapitalPlan/>;
      case'dept/dashboard':return<DeptDashboard deptId={deptId} onNav={nav}/>;
      case'dept/budget-request':return<BudgetRequestForm deptId={deptId} onNav={nav} refreshData={refreshData}/>;
      case'dept/capital-request':return<CapitalRequestForm deptId={deptId} onNav={nav} refreshData={refreshData}/>;
      case'tm/dashboard':return<TMDashboard onNav={nav}/>;
      case'tm/capital-review':return<TMCapitalReview refreshData={refreshData}/>;
      case'tm/departments':return<TMDepartmentManager onNav={nav} refreshData={refreshData}/>;
      case'tm/users':return<TMUserManagement/>;
      case'tm/upload':return<TMDataUpload onNav={nav} refreshData={refreshData}/>;
      case'tm/publish':return<TMPublish onNav={nav}/>;
      default:if(view.startsWith('tm/department'))return<TMDeptReview deptId={viewParam} onNav={nav} refreshData={refreshData}/>;return<PublicDashboard onNav={nav}/>;
    }
  }

  const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{"accentColor":"oklch(0.72 0.12 82)","sidebarColor":"oklch(0.22 0.07 155)","fontScale":1}/*EDITMODE-END*/;

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar role={role} deptId={deptId} view={view} onNav={nav} onSwitch={handleSwitch}/>
      <main style={{flex:1,overflowY:'auto',background:'oklch(0.97 0.01 155)'}}>{renderView()}</main>
      {tweaks&&(
        <div style={{position:'fixed',bottom:20,right:20,background:'#fff',border:'1px solid #dde8e2',borderRadius:12,boxShadow:'0 4px 20px rgba(0,0,0,0.12)',padding:'16px 18px',width:220,zIndex:9999}}>
          <div style={{fontSize:11,fontWeight:700,color:'#1b2e22',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.06em'}}>Tweaks</div>
          <div style={{fontSize:11,color:'#5a7a66',marginBottom:6}}>Sidebar Color</div>
          <div style={{display:'flex',gap:7,marginBottom:12}}>
            {['oklch(0.22 0.07 155)','oklch(0.18 0.05 240)','oklch(0.20 0.04 30)'].map(c=><div key={c} onClick={()=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:{sidebarColor:c}},'*')} style={{width:26,height:26,borderRadius:5,background:c,cursor:'pointer',border:'2px solid rgba(0,0,0,0.1)'}}/>)}
          </div>
          <div style={{fontSize:11,color:'#5a7a66',marginBottom:6}}>Accent Color</div>
          <div style={{display:'flex',gap:7}}>
            {['oklch(0.72 0.12 82)','oklch(0.65 0.12 145)','oklch(0.68 0.12 30)'].map(c=><div key={c} onClick={()=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*')} style={{width:26,height:26,borderRadius:5,background:c,cursor:'pointer',border:'2px solid rgba(0,0,0,0.1)'}}/>)}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
